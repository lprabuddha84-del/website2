<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanka Luxe | My Wishlist</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            900: '#0F3A2E',
                            950: '#0D0D0C',
                        },
                        accent: {
                            400: '#C5A880',
                            500: '#9E805A',
                        },
                        stone: {
                            50: '#FAF7F2',
                            100: '#F5EFE6',
                            200: '#EAE1D4',
                            850: '#0D0D0C',
                        }
                    },
                    fontFamily: {
                        heading: ['Playfair Display', 'serif'],
                        body: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-nav {
            background: rgba(250, 247, 242, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        body {
            background-color: #FAF7F2;
            color: #0D0D0C;
        }
    </style>
</head>
<body class="font-body selection:bg-stone-200 selection:text-stone-850">

    <!-- 1. Header Navigation -->
    <header class="sticky top-0 z-40 w-full border-b border-stone-200/50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 lg:px-10">
            <div class="flex items-center justify-between h-24">
                <!-- Mobile Menu Button -->
                <div class="flex items-center md:hidden">
                    <button id="menu-toggle" class="text-stone-850 focus:outline-none p-2" aria-label="Toggle Menu">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>

                <!-- Logo -->
                <div class="flex-1 md:flex-none text-center md:text-left">
                    <a href="index.html" class="inline-block">
                        <span class="font-body text-lg font-bold tracking-[0.35em] text-primary-950 uppercase">LANKA LUXE</span>
                    </a>
                </div>

                <!-- Navigation Links -->
                <nav class="hidden md:flex space-x-12">
                    <a href="index.html" class="text-xs font-semibold tracking-[0.25em] uppercase text-stone-400 hover:text-primary-955 transition-colors pb-1 border-b border-transparent hover:border-accent-400">Home</a>
                    <a href="shop.html" class="text-xs font-semibold tracking-[0.25em] uppercase text-stone-400 hover:text-primary-955 transition-colors pb-1 border-b border-transparent hover:border-accent-400">Shop</a>
                    <a href="wishlist.html" class="text-xs font-semibold tracking-[0.25em] uppercase text-primary-950 border-b border-primary-950 pb-1">Wishlist</a>
                </nav>

                <!-- Action Links -->
                <div class="flex items-center space-x-6">
                    <!-- Shopping Cart Icon -->
                    <button class="open-cart-trigger relative text-stone-850 hover:text-accent-500 transition-colors p-1 focus:outline-none" aria-label="Shopping Drawer">
                        <svg class="h-5.5 w-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                        <span class="cart-count-badge hidden absolute top-0 right-0 transform translate-x-1/2 -translate-y-1/2 bg-stone-900 text-white text-[9px] font-bold rounded-full h-4 w-4 flex items-center justify-center border border-stone-50">0</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Panel -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-stone-200/50 bg-stone-50 px-6 py-6 space-y-3 shadow-xl">
            <a href="index.html" class="block text-xs font-bold uppercase tracking-[0.2em] text-stone-500 py-2">Home</a>
            <a href="shop.html" class="block text-xs font-bold uppercase tracking-[0.2em] text-stone-500 py-2">Shop</a>
            <a href="wishlist.html" class="block text-xs font-bold uppercase tracking-[0.2em] text-primary-950 py-2">Wishlist</a>
        </div>
    </header>

    <!-- 2. Page Header Banner -->
    <div class="bg-stone-100/40 border-b border-stone-200/50 py-12 sm:py-16">
        <div class="max-w-7xl mx-auto px-6 lg:px-10">
            <nav class="flex text-[10px] font-bold uppercase tracking-[0.2em] text-stone-400 mb-5" aria-label="Breadcrumb">
                <a href="index.html" class="hover:text-primary-950 transition-colors">Home</a>
                <span class="mx-3">/</span>
                <span class="text-stone-850 font-semibold">Wishlist</span>
            </nav>
            <h1 class="font-heading text-4xl sm:text-5xl font-light text-stone-850 tracking-wide">Saved Items</h1>
        </div>
    </div>

    <!-- 3. Wishlist Content Core -->
    <main class="max-w-7xl mx-auto px-6 lg:px-10 py-16">
        <div id="wishlist-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 min-h-[300px]">
            <!-- Dynamic elements populated via JS -->
        </div>
    </main>

    <!-- 4. Footer -->
    <footer class="bg-stone-950 text-stone-500 border-t border-stone-900 pt-16 pb-12 text-xs mt-20">
        <div class="max-w-7xl mx-auto px-6 lg:px-10 text-center">
            <p class="text-[10px] font-semibold uppercase tracking-[0.25em] text-stone-600">&copy; 2026 Lanka Luxe. Weaved with pride in Sri Lanka.</p>
        </div>
    </footer>

    <!-- Shared Core Engine JS -->
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderWishlistPage();
            window.addEventListener('wishlistUpdated', renderWishlistPage);
        });

        function renderWishlistPage() {
            const container = document.getElementById('wishlist-container');
            if (!container) return;

            if (wishlist.length === 0) {
                container.parentNode.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-24 text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-stone-300 mb-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                        </svg>
                        <h3 class="font-heading text-xl font-light text-stone-850">Your Wishlist is Empty</h3>
                        <p class="text-xs text-stone-400 max-w-sm mt-3 uppercase tracking-wider leading-relaxed">Save your favorite island garments from our catalog to review them here.</p>
                        <a href="shop.html" class="mt-8 inline-block bg-stone-900 text-white text-xs font-bold tracking-[0.2em] uppercase px-8 py-4 shadow hover:bg-stone-800 transition-colors rounded-none">Browse Shop</a>
                    </div>
                `;
                return;
            }

            let html = '';
            wishlist.forEach(id => {
                const product = products.find(p => p.id === id);
                if (!product) return;

                const hasDiscount = product.originalPrice > product.price;
                const discountVal = hasDiscount ? Math.round((1 - product.price/product.originalPrice)*100) : 0;

                html += `
                    <div class="group flex flex-col bg-white rounded-none border border-stone-200/60 overflow-hidden relative transition-all duration-500 hover:shadow-2xl">
                        <!-- Image Frame -->
                        <div class="aspect-[4/5] overflow-hidden relative bg-stone-50 border-b border-stone-100">
                            <!-- Discount Badge -->
                            ${hasDiscount ? `<span class="absolute top-4 left-4 z-10 bg-accent-400 text-stone-950 text-[9px] font-bold tracking-[0.2em] px-2.5 py-1.5 uppercase rounded-none shadow-md">-${discountVal}%</span>` : ''}
                            
                            <!-- Delete from wishlist -->
                            <button onclick="toggleWishlist(${product.id})" class="absolute top-4 right-4 z-10 bg-white/90 backdrop-blur-sm p-2 rounded-full shadow hover:bg-white text-red-500 focus:outline-none border border-stone-200/50" title="Remove from Wishlist">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 fill-current" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
                                </svg>
                            </button>

                            <a href="product.html?id=${product.id}" class="block h-full">
                                <img src="${product.images[0]}" alt="${product.title}" class="w-full h-full object-cover transition-transform duration-[1000ms] group-hover:scale-105">
                            </a>
                        </div>

                        <!-- Card text details -->
                        <div class="p-6 flex flex-col flex-1 bg-white">
                            <span class="text-[9px] uppercase font-bold tracking-[0.25em] text-accent-500 mb-2">${product.category}</span>
                            <h3 class="font-heading text-base font-light text-stone-850 leading-tight mb-2 hover:text-accent-500 transition-colors">
                                <a href="product.html?id=${product.id}">${product.title}</a>
                            </h3>
                            
                            <div class="flex items-baseline gap-2 mt-auto font-mono mb-4">
                                <span class="text-sm font-semibold text-stone-850">Rs. ${product.price.toLocaleString()}</span>
                                ${hasDiscount ? `<span class="text-xs text-stone-400 line-through">Rs. ${product.originalPrice.toLocaleString()}</span>` : ''}
                            </div>

                            <button onclick="addToCart(${product.id}, 1)" class="w-full mt-2 bg-stone-900 text-white text-[10px] font-bold uppercase tracking-[0.2em] py-3 rounded-none hover:bg-stone-850 transition-colors shadow-sm">
                                Move to Bag
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }
    </script>
</body>
</html>
