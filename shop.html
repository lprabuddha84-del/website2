<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanka Luxe | Collections Catalog</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            900: '#0F3A2E',
                            950: '#0D0D0C',
                        },
                        accent: {
                            400: '#C5A880',
                            500: '#9E805A',
                        },
                        stone: {
                            50: '#FAF7F2',
                            100: '#F5EFE6',
                            200: '#EAE1D4',
                            450: '#8e7965',
                            850: '#0D0D0C',
                        }
                    },
                    fontFamily: {
                        heading: ['Playfair Display', 'serif'],
                        body: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-nav {
            background: rgba(250, 247, 242, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        body {
            background-color: #FAF7F2;
            color: #0D0D0C;
        }
    </style>
</head>
<body class="font-body selection:bg-stone-200 selection:text-stone-850">

    <!-- 1. Header Navigation -->
    <header class="sticky top-0 z-40 w-full border-b border-stone-200/50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 lg:px-10">
            <div class="flex items-center justify-between h-24">
                <!-- Mobile Menu Button -->
                <div class="flex items-center md:hidden">
                    <button id="menu-toggle" class="text-stone-850 focus:outline-none p-2" aria-label="Toggle Menu">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>

                <!-- Logo -->
                <div class="flex-1 md:flex-none text-center md:text-left">
                    <a href="index.html" class="inline-block">
                        <span class="font-body text-lg font-bold tracking-[0.35em] text-primary-950 uppercase">LANKA LUXE</span>
                    </a>
                </div>

                <!-- Navigation Links -->
                <nav class="hidden md:flex space-x-12">
                    <a href="index.html" class="text-xs font-semibold tracking-[0.25em] uppercase text-stone-400 hover:text-primary-950 transition-colors pb-1 border-b border-transparent hover:border-accent-400">Home</a>
                    <a href="shop.html" class="text-xs font-semibold tracking-[0.25em] uppercase text-primary-950 border-b border-primary-950 pb-1">Shop</a>
                    <a href="wishlist.html" class="text-xs font-semibold tracking-[0.25em] uppercase text-stone-400 hover:text-primary-950 transition-colors pb-1 border-b border-transparent hover:border-accent-400">Wishlist</a>
                </nav>

                <!-- Action Links -->
                <div class="flex items-center space-x-6">
                    <a href="wishlist.html" class="relative text-stone-850 hover:text-accent-500 transition-colors p-1" aria-label="My Wishlist">
                        <svg class="h-5.5 w-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                        </svg>
                        <span class="wishlist-count-badge hidden absolute top-0 right-0 transform translate-x-1/2 -translate-y-1/2 bg-accent-400 text-stone-850 text-[9px] font-bold rounded-full h-4 w-4 flex items-center justify-center border border-stone-50">0</span>
                    </a>

                    <button class="open-cart-trigger relative text-stone-850 hover:text-accent-500 transition-colors p-1 focus:outline-none" aria-label="Shopping Drawer">
                        <svg class="h-5.5 w-5.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                        </svg>
                        <span class="cart-count-badge hidden absolute top-0 right-0 transform translate-x-1/2 -translate-y-1/2 bg-stone-900 text-white text-[9px] font-bold rounded-full h-4 w-4 flex items-center justify-center border border-stone-50">0</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu Panel -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-stone-200/50 bg-stone-50 px-6 py-6 space-y-3 shadow-xl">
            <a href="index.html" class="block text-xs font-bold uppercase tracking-[0.2em] text-stone-500 py-2">Home</a>
            <a href="shop.html" class="block text-xs font-bold uppercase tracking-[0.2em] text-primary-950 py-2">Shop</a>
            <a href="wishlist.html" class="block text-xs font-bold uppercase tracking-[0.2em] text-stone-500 py-2">Wishlist</a>
        </div>
    </header>

    <!-- 2. Page Header & Search Banner -->
    <div class="bg-stone-100/40 border-b border-stone-200/50 py-12 sm:py-16">
        <div class="max-w-7xl mx-auto px-6 lg:px-10">
            <nav class="flex text-[10px] font-bold uppercase tracking-[0.2em] text-stone-400 mb-5" aria-label="Breadcrumb">
                <a href="index.html" class="hover:text-primary-950 transition-colors">Home</a>
                <span class="mx-3">/</span>
                <span class="text-stone-850 font-semibold">Collections</span>
            </nav>
            <h1 class="font-heading text-4xl sm:text-5xl font-light text-stone-850 tracking-wide mb-8">All Collections</h1>
            
            <!-- Luxury Search Input -->
            <div class="max-w-xl relative mt-2 shadow-sm rounded-none border border-stone-300 focus-within:border-stone-800 bg-white transition-all">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-stone-400 pointer-events-none">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" id="catalog-search" placeholder="Search silk sarees, linen, resort kaftans..." class="w-full pl-12 pr-4 py-4 focus:outline-none text-xs uppercase tracking-widest text-stone-850 placeholder-stone-400 bg-transparent">
            </div>
        </div>
    </div>

    <!-- 3. Catalog Section -->
    <main class="max-w-7xl mx-auto px-6 lg:px-10 py-16">
        <div class="flex flex-col lg:flex-row gap-16">
            
            <!-- Filters Sidebar -->
            <aside id="sidebar-filters" class="hidden lg:block w-60 flex-shrink-0">
                <div class="border border-stone-200/60 p-8 bg-white shadow-sm sticky top-28 space-y-10 rounded-none">
                    <div class="flex items-center justify-between border-b border-stone-200/60 pb-5">
                        <h2 class="text-xs font-bold uppercase tracking-[0.25em] text-stone-850">Refine By</h2>
                        <button onclick="resetFilters()" class="text-[9px] font-bold text-accent-500 hover:text-stone-900 transition-colors uppercase tracking-[0.2em]">Reset All</button>
                    </div>

                    <!-- Categories Filter -->
                    <div>
                        <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-stone-400 mb-4">Categories</h3>
                        <div class="space-y-3.5" id="category-filter-group">
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="category" value="All" checked class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>All Products</span>
                            </label>
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="category" value="Sarees" class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>Heritage Sarees</span>
                            </label>
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="category" value="Linen" class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>Linen Apparel</span>
                            </label>
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="category" value="Resort Wear" class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>Resort Wear</span>
                            </label>
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="category" value="Festive" class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>Festive</span>
                            </label>
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="category" value="Heritage" class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>Heritage Weaves</span>
                            </label>
                        </div>
                    </div>

                    <!-- Price Filter -->
                    <div>
                        <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-stone-400 mb-4">Price Range</h3>
                        <div class="space-y-3.5" id="price-filter-group">
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="price" value="All" checked class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>All Prices</span>
                            </label>
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="price" value="under-7k" class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>Under Rs. 7,000</span>
                            </label>
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="price" value="7k-12k" class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>Rs. 7,000 - 12,000</span>
                            </label>
                            <label class="flex items-center gap-3 text-xs uppercase tracking-wider text-stone-700 cursor-pointer">
                                <input type="radio" name="price" value="above-12k" class="h-3.5 w-3.5 border-stone-300 text-stone-900 focus:ring-stone-900 rounded-full">
                                <span>Above Rs. 12,000</span>
                            </label>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Catalog Core Content -->
            <div class="flex-1">
                <!-- Sorting & Mobile Filter Toggle -->
                <div class="flex items-center justify-between border-b border-stone-200/60 pb-5 mb-10">
                    <!-- Mobile Filter Button -->
                    <button onclick="toggleMobileFilters()" class="lg:hidden flex items-center gap-2 border border-stone-300 bg-white px-4 py-2.5 rounded-none text-xs font-semibold uppercase tracking-[0.15em] text-stone-800">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
                        </svg>
                        Filters
                    </button>

                    <!-- Items Count -->
                    <p class="text-xs uppercase tracking-[0.1em] text-stone-400 font-semibold hidden sm:block">
                        Showing <span id="catalog-count-display" class="text-stone-850 font-bold font-mono">0</span> designs
                    </p>

                    <!-- Sort Dropdown -->
                    <div class="flex items-center gap-3">
                        <label for="catalog-sort" class="text-[10px] font-bold uppercase tracking-[0.2em] text-stone-400">Sort By</label>
                        <select id="catalog-sort" class="border border-stone-300 bg-white rounded-none px-4 py-2 text-xs uppercase tracking-widest text-stone-800 focus:outline-none focus:border-stone-800">
                            <option value="featured">Featured</option>
                            <option value="price-asc">Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                            <option value="rating-desc">Highest Rated</option>
                        </select>
                    </div>
                </div>

                <!-- Product Catalog Grid -->
                <div id="catalog-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10 sm:gap-8 lg:gap-10 min-h-[450px]">
                    <!-- Populated dynamically via script.js -->
                </div>
            </div>

        </div>
    </main>

    <!-- Mobile Filters Drawer -->
    <div id="mobile-filter-drawer" class="fixed inset-0 z-50 hidden">
        <div class="fixed inset-0 bg-stone-950/60 backdrop-blur-sm" onclick="toggleMobileFilters()"></div>
        <div class="fixed inset-y-0 left-0 max-w-xs w-full bg-stone-50 shadow-2xl p-8 flex flex-col z-10 border-r border-stone-200">
            <div class="flex items-center justify-between border-b border-stone-200 pb-4 mb-6">
                <h2 class="text-xs font-bold uppercase tracking-[0.25em] text-stone-850">Refine Details</h2>
                <button onclick="toggleMobileFilters()" class="text-stone-400 hover:text-stone-800 p-1">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div class="flex-1 overflow-y-auto space-y-8 pr-2">
                <div>
                    <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-stone-400 mb-4">Categories</h3>
                    <div class="space-y-3.5" id="mobile-category-filter-group">
                        <!-- Cloned via JS -->
                    </div>
                </div>

                <div>
                    <h3 class="text-[10px] font-bold uppercase tracking-[0.2em] text-stone-400 mb-4">Price Range</h3>
                    <div class="space-y-3.5" id="mobile-price-filter-group">
                        <!-- Cloned via JS -->
                    </div>
                </div>
            </div>
            
            <div class="border-t border-stone-200 pt-6 mt-6 flex gap-4">
                <button onclick="resetFilters(); toggleMobileFilters()" class="flex-1 py-4 text-center border border-stone-300 text-xs font-bold tracking-widest uppercase rounded-none text-stone-600 bg-white">Clear</button>
                <button onclick="toggleMobileFilters()" class="flex-1 py-4 text-center bg-stone-900 text-white text-xs font-bold tracking-widest uppercase rounded-none">Apply</button>
            </div>
        </div>
    </div>

    <!-- 4. Footer -->
    <footer class="bg-stone-950 text-stone-500 border-t border-stone-900 pt-16 pb-12 text-xs mt-20">
        <div class="max-w-7xl mx-auto px-6 lg:px-10 text-center">
            <p class="text-[10px] font-semibold uppercase tracking-[0.25em] text-stone-600">&copy; 2026 Lanka Luxe. Weaved with pride in Sri Lanka.</p>
        </div>
    </footer>

    <!-- Shared Core Engine JS -->
    <script src="script.js"></script>
    <script>
        let selectedCategory = 'All';
        let selectedPriceRange = 'All';
        let selectedSort = 'featured';
        let searchQuery = '';

        document.addEventListener('DOMContentLoaded', () => {
            initializeFiltersFromURL();
            setupCatalogEventListeners();
            renderCatalog();

            window.addEventListener('wishlistUpdated', () => {
                products.forEach(p => {
                    const isLiked = wishlist.includes(p.id);
                    updateWishlistButtons(p.id, isLiked);
                });
            });
        });

        function initializeFiltersFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const categoryParam = urlParams.get('category');
            if (categoryParam) {
                selectedCategory = categoryParam;
                const desktopRadio = document.querySelector(`#category-filter-group input[value="${categoryParam}"]`);
                if (desktopRadio) desktopRadio.checked = true;
            }

            const deskCatHTML = document.getElementById('category-filter-group').innerHTML;
            document.getElementById('mobile-category-filter-group').innerHTML = deskCatHTML.replace(/name="category"/g, 'name="mobile-category"');
            
            const deskPriceHTML = document.getElementById('price-filter-group').innerHTML;
            document.getElementById('mobile-price-filter-group').innerHTML = deskPriceHTML.replace(/name="price"/g, 'name="mobile-price"');

            if (categoryParam) {
                const mobileRadio = document.querySelector(`#mobile-category-filter-group input[value="${categoryParam}"]`);
                if (mobileRadio) mobileRadio.checked = true;
            }
        }

        function setupCatalogEventListeners() {
            const searchInput = document.getElementById('catalog-search');
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase().trim();
                renderCatalog();
            });

            const sortSelect = document.getElementById('catalog-sort');
            sortSelect.addEventListener('change', (e) => {
                selectedSort = e.target.value;
                renderCatalog();
            });

            const catFilters = document.querySelectorAll('#category-filter-group input[type="radio"]');
            catFilters.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    selectedCategory = e.target.value;
                    const mobRadio = document.querySelector(`#mobile-category-filter-group input[value="${e.target.value}"]`);
                    if (mobRadio) mobRadio.checked = true;
                    renderCatalog();
                });
            });

            const priceFilters = document.querySelectorAll('#price-filter-group input[type="radio"]');
            priceFilters.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    selectedPriceRange = e.target.value;
                    const mobRadio = document.querySelector(`#mobile-price-filter-group input[value="${e.target.value}"]`);
                    if (mobRadio) mobRadio.checked = true;
                    renderCatalog();
                });
            });

            document.addEventListener('change', (e) => {
                if (e.target.name === 'mobile-category') {
                    selectedCategory = e.target.value;
                    const deskRadio = document.querySelector(`#category-filter-group input[value="${e.target.value}"]`);
                    if (deskRadio) deskRadio.checked = true;
                    renderCatalog();
                }
                if (e.target.name === 'mobile-price') {
                    selectedPriceRange = e.target.value;
                    const deskRadio = document.querySelector(`#price-filter-group input[value="${e.target.value}"]`);
                    if (deskRadio) deskRadio.checked = true;
                    renderCatalog();
                }
            });
        }

        function toggleMobileFilters() {
            const mobFilters = document.getElementById('mobile-filter-drawer');
            mobFilters.classList.toggle('hidden');
        }

        function resetFilters() {
            selectedCategory = 'All';
            selectedPriceRange = 'All';
            searchQuery = '';
            document.getElementById('catalog-search').value = '';

            const defaultCat = document.querySelector('#category-filter-group input[value="All"]');
            if (defaultCat) defaultCat.checked = true;
            const defaultPrice = document.querySelector('#price-filter-group input[value="All"]');
            if (defaultPrice) defaultPrice.checked = true;

            const defaultMobCat = document.querySelector('#mobile-category-filter-group input[value="All"]');
            if (defaultMobCat) defaultMobCat.checked = true;
            const defaultMobPrice = document.querySelector('#mobile-price-filter-group input[value="All"]');
            if (defaultMobPrice) defaultMobPrice.checked = true;

            renderCatalog();
        }

        function renderCatalog() {
            const grid = document.getElementById('catalog-grid');
            const countDisplay = document.getElementById('catalog-count-display');
            if (!grid) return;

            let filtered = products.filter(product => {
                const categoryMatch = selectedCategory === 'All' || product.category === selectedCategory;
                
                let priceMatch = true;
                if (selectedPriceRange === 'under-7k') {
                    priceMatch = product.price < 7000;
                } else if (selectedPriceRange === '7k-12k') {
                    priceMatch = product.price >= 7000 && product.price <= 12000;
                } else if (selectedPriceRange === 'above-12k') {
                    priceMatch = product.price > 12000;
                }

                const textSearch = product.title.toLowerCase().includes(searchQuery) || 
                                   product.category.toLowerCase().includes(searchQuery) ||
                                   product.description.toLowerCase().includes(searchQuery);

                return categoryMatch && priceMatch && textSearch;
            });

            if (selectedSort === 'price-asc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (selectedSort === 'price-desc') {
                filtered.sort((a, b) => b.price - a.price);
            } else if (selectedSort === 'rating-desc') {
                filtered.sort((a, b) => b.rating - a.rating);
            }

            if (countDisplay) {
                countDisplay.textContent = filtered.length;
            }

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-24 text-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-stone-300 mb-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <h3 class="font-heading text-xl font-light text-stone-850">No Designs Found</h3>
                        <p class="text-xs text-stone-400 max-w-sm mt-3 uppercase tracking-wider leading-relaxed">Adjust filters or type alternative keywords to browse collections.</p>
                        <button onclick="resetFilters()" class="mt-8 bg-stone-900 text-white text-xs font-bold tracking-[0.2em] uppercase px-8 py-4 shadow hover:bg-stone-800 transition-colors rounded-none">Reset All Filters</button>
                    </div>
                `;
                return;
            }

            let html = '';
            filtered.forEach(product => {
                const isLiked = wishlist.includes(product.id);
                const heartClass = isLiked ? 'text-red-500 fill-current' : 'text-stone-700 hover:text-red-500';
                const hasDiscount = product.originalPrice > product.price;
                const discountVal = hasDiscount ? Math.round((1 - product.price/product.originalPrice)*100) : 0;

                html += `
                    <div class="group flex flex-col bg-white rounded-none border border-stone-200/60 overflow-hidden relative transition-all duration-500 hover:shadow-2xl">
                        <!-- Image Container -->
                        <div class="aspect-[4/5] overflow-hidden relative bg-stone-50 border-b border-stone-100">
                            <!-- Discount Badge -->
                            ${hasDiscount ? `<span class="absolute top-4 left-4 z-10 bg-accent-400 text-stone-950 text-[9px] font-bold tracking-[0.2em] px-2.5 py-1.5 uppercase rounded-none shadow-md">-${discountVal}%</span>` : ''}
                            
                            <!-- Wishlist Hearts -->
                            <button onclick="toggleWishlist(${product.id})" class="wishlist-btn absolute top-4 right-4 z-10 bg-white/90 backdrop-blur-sm p-2.5 rounded-full shadow hover:bg-white transition-all focus:outline-none border border-stone-200/50" data-id="${product.id}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5 ${heartClass} transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                </svg>
                            </button>

                            <a href="product.html?id=${product.id}" class="block h-full">
                                <img src="${product.images[0]}" alt="${product.title}" class="w-full h-full object-cover transition-transform duration-[1000ms] group-hover:scale-105">
                            </a>

                            <!-- Hover Add Bag -->
                            <div class="absolute bottom-4 inset-x-4 transform translate-y-12 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-500">
                                <button onclick="addToCart(${product.id}, 1)" class="w-full bg-stone-900/95 backdrop-blur text-white text-[10px] font-bold uppercase tracking-[0.2em] py-3.5 rounded-none shadow-lg hover:bg-stone-950 transition-colors">
                                    Add to Bag
                                </button>
                            </div>
                        </div>

                        <!-- Info details -->
                        <div class="p-6 flex flex-col flex-1 bg-white">
                            <span class="text-[9px] uppercase font-bold tracking-[0.25em] text-accent-500 mb-2">${product.category}</span>
                            <h3 class="font-heading text-base font-light text-stone-850 leading-tight mb-2 hover:text-accent-500 transition-colors">
                                <a href="product.html?id=${product.id}">${product.title}</a>
                            </h3>

                            <!-- Star Rating -->
                            <div class="flex items-center gap-1 mb-4">
                                <svg class="w-3 h-3 text-accent-400 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                <span class="text-[10px] font-bold text-stone-850">${product.rating}</span>
                                <span class="text-[10px] text-stone-450 uppercase tracking-widest font-semibold ml-1">(${product.reviewsCount})</span>
                            </div>

                            <!-- Prices -->
                            <div class="flex items-baseline gap-2 mt-auto font-mono">
                                <span class="text-sm font-semibold text-stone-850">Rs. ${product.price.toLocaleString()}</span>
                                ${hasDiscount ? `<span class="text-xs text-stone-400 line-through">Rs. ${product.originalPrice.toLocaleString()}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }
    </script>
</body>
</html>
